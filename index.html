<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#texto{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:1.5rem;
    text-align:center;
    z-index:10;
    transition:1s;
}

#videoContainer{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:90%;
    max-width:400px;
    transition:1.5s ease;
    z-index:20;
}

#videoContainer.show{
    transform:translate(-50%,-50%) scale(1);
}

iframe{
    width:100%;
    height:700px;
    border:none;
    border-radius:20px;
    box-shadow:0 0 40px rgba(255,255,255,.3);
}
</style>
</head>

<body>

<div id="texto">
    Toca la pantalla ❤️
</div>

<div id="videoContainer">
    <iframe
    src="https://www.youtube.com/embed/-nwmtQeC8Kc"
    allowfullscreen>
    </iframe>
</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let phase = 0;

function heartPoint(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

class Particle{

    constructor(x,y,targetX,targetY){
        this.x=x;
        this.y=y;
        this.tx=targetX;
        this.ty=targetY;
        this.size=Math.random()*3+1;
        this.vx=0;
        this.vy=0;
    }

    update(){

        if(phase===1){

            this.x+=(this.tx-this.x)*0.05;
            this.y+=(this.ty-this.y)*0.05;

        }else if(phase===2){

            this.x+=this.vx;
            this.y+=this.vy;

        }

    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle="#ff4d88";
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function createHeart(){

    particles=[];

    for(let i=0;i<2000;i++){

        let t=Math.random()*Math.PI*2;

        let p=heartPoint(t);

        let scale=15;

        let targetX=canvas.width/2+p.x*scale;
        let targetY=canvas.height/2+p.y*scale;

        particles.push(
            new Particle(
                Math.random()*canvas.width,
                Math.random()*canvas.height,
                targetX,
                targetY
            )
        );
    }
}

let beatScale=1;

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(phase===1){

        beatScale=1+Math.sin(Date.now()*0.005)*0.08;

        particles.forEach(p=>{

            let dx=p.tx-canvas.width/2;
            let dy=p.ty-canvas.height/2;

            p.tx=canvas.width/2+dx*beatScale;
            p.ty=canvas.height/2+dy*beatScale;

            p.update();
            p.draw();

        });

    }else{

        particles.forEach(p=>{
            p.update();
            p.draw();
        });

    }

    requestAnimationFrame(animate);
}

animate();

document.addEventListener("click",()=>{

    if(phase===0){

        document.getElementById("texto").style.opacity="0";

        createHeart();

        phase=1;

    }

    else if(phase===1){

        phase=2;

        particles.forEach(p=>{

            let angle=Math.random()*Math.PI*2;
            let speed=Math.random()*8+2;

            p.vx=Math.cos(angle)*speed;
            p.vy=Math.sin(angle)*speed;

        });

        setTimeout(()=>{

            document.getElementById("videoContainer")
            .classList.add("show");

        },1200);

    }

});

window.addEventListener("resize",()=>{

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

});

</script>

</body>
</html>
